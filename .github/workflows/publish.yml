name: Publish Orange Builder 🟠

on:
  push:
    tags:
      - 'v*.*.*'  # Only run when you push a version tag like v1.0.0

permissions:
  contents: read        # Needed to checkout code
  packages: write       # Needed to upload to PyPI
  id-token: write       # Needed for OIDC authentication

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3️⃣ Install build tools
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      # 4️⃣ Clean old builds
      - name: Clean old builds
        run: rm -rf dist

      # 5️⃣ Build source and wheel
      - name: Build package
        run: python -m build

      # 6️⃣ Publish to real PyPI via OIDC
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          package-dir: ./dist
